<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Page Not Found | Rice Village Shops</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #0f172a; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .container { text-align: center; max-width: 480px; }
    .code { font-size: 6rem; font-weight: 800; color: #2563eb; line-height: 1; }
    h1 { font-size: 1.5rem; margin: 16px 0 8px; }
    p { color: #64748b; margin-bottom: 24px; line-height: 1.6; }
    a { display: inline-block; background: #2563eb; color: #fff; text-decoration: none; padding: 12px 32px; border-radius: 8px; font-weight: 600; transition: background 0.2s; }
    a:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>This page may have moved when we redesigned the site. Head back to the homepage to browse 350+ Rice Village shops, restaurants, and bars.</p>
    <a href="/">Back to Rice Village Shops</a>
  </div>
<!-- Cookie Consent Banner -->
<div class="cookie-consent" id="cookieConsent">
  <p>We use cookies for analytics and personalized ads. See our <a href="/privacy.html">Privacy Policy</a>.</p>
  <div class="cookie-consent__buttons">
    <button class="cookie-consent__btn cookie-consent__btn--accept" onclick="acceptCookies()">Accept</button>
    <button class="cookie-consent__btn cookie-consent__btn--reject" onclick="rejectCookies()">Reject</button>
  </div>
</div>
<script>
function loadGA4(){
  var s=document.createElement("script");
  s.async=true;s.src="https://www.googletagmanager.com/gtag/js?id=G-MSPTB0HJ97";
  document.head.appendChild(s);
  s.onload=function(){
    window.dataLayer=window.dataLayer||[];
    function gtag(){dataLayer.push(arguments);}
    window.gtag=gtag;
    gtag("js",new Date());
    gtag("config","G-MSPTB0HJ97");
  };
}
function loadAdSense(){
  var s=document.createElement("script");
  s.async=true;s.crossOrigin="anonymous";
  s.src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7732757886192071";
  document.head.appendChild(s);
}
function acceptCookies(){
  localStorage.setItem("cookieConsent","accepted");
  document.getElementById("cookieConsent").classList.remove("active");
  loadGA4();loadAdSense();
}
function rejectCookies(){
  localStorage.setItem("cookieConsent","rejected");
  document.getElementById("cookieConsent").classList.remove("active");
}
(function(){
  var consent=localStorage.getItem("cookieConsent");
  if(consent==="accepted"){loadGA4();loadAdSense();}
  else if(!consent){document.getElementById("cookieConsent").classList.add("active");}
})();
</script>
</body>
</html>
